<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Model Viewer</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"
    }
  }
  </script>
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer-module.js"></script>
</head>

<body>
  <div id="app" class="model-viewer-overlay">
    <!-- model-viewer -->
    <model-viewer id="modelViewer" zoom-sensitivity="0.5" camera-controls
      interaction-prompt="none" style="opacity:0; transition: opacity 0.3s ease; width:100%; height:100%;
             background: linear-gradient(180deg, #1C1F1F 0%, #525252 100%);
             transform-origin: top left;">
    </model-viewer>

    <!-- 加载进度 -->
    <div id="loadingProgress" class="model-loading-progress hidden">
      <div class="flex flex-col items-center justify-center">
        <div class="flex flex-col items-center justify-between">
          <div class="spinner"></div>
          <div class="loading-text">
            模型加载中
            <span id="progressText" class="process-text">0%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 空状态上传提示 -->
    <div id="emptyState" class="empty-state">
      <div id="emptyDropzone" class="empty-dropzone" role="button" tabindex="0" aria-label="拖拽或点击上传模型">
        <div class="empty-title">拖拽模型到这里</div>
        <div class="empty-subtitle">或点击上传模型</div>
        <div class="empty-format-tip">当前仅支持 .glb 格式</div>
      </div>
    </div>

    <!-- 左侧面板 -->

            模型查看器</div>
          <div class="model-info-divider"></div>
          <div class="flex items-center justify-between">
            <div>拓扑</div>
            <div class="val">三角面</div>
          </div>
          <div class="flex items-center justify-between">
            <div>面数</div>
            <div class="val" id="triangleCount">-</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧面板 -->
    <div id="rightPanel" class="right-panel pointer-events-none">
      <div class="right-panel-main flex flex-col gap-2">
        <!-- 显示设置 -->
        <div class="display-settings">
          <div class="display-settings-title">显示设置</div>
          <div class="display-settings-content">
            <div class="display-settings-item">
              <div class="display-settings-item-title">透视关系</div>
              <div class="flex items-center justify-between gap-1">
                <div class="w-1/2 projection-btn is-active" data-projection="perspective">
                  <img src="assets/icons/perspective.svg" alt="透视" width="18" height="18" />
                  <span>透视</span>
                </div>
                <div class="w-1/2 projection-btn" data-projection="orthographic">
                  <img src="assets/icons/orthographic.svg" alt="正交" width="18" height="18" />
                  <span>正交</span>
                </div>
              </div>
            </div>
            <div class="display-settings-item">
              <div class="display-settings-item-title">预设角度</div>
              <div class="flex flex-col gap-1">
                <div class="flex items-center justify-between gap-1">
                  <div class="w-1/2 projection-btn is-active" data-view="front">
                    <img src="assets/icons/正视图.svg" alt="前视" width="36" height="36" />
                  </div>
                  <div class="w-1/2 projection-btn" data-view="back">
                    <img src="assets/icons/背视图.svg" alt="后视" width="36" height="36" />
                  </div>
                </div>
                <div class="flex items-center justify-between gap-1">
                  <div class="w-1/2 projection-btn" data-view="side">
                    <img src="assets/icons/侧视图.svg" alt="侧视" width="36" height="36" />
                  </div>
                  <div class="w-1/2 projection-btn" data-view="top">
                    <img src="assets/icons/俯视图.svg" alt="俯视" width="36" height="36" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 灯光设置 -->
        <div class="lighting-settings">
          <div class="lighting-settings-title">灯光设置</div>
          <div class="lighting-settings-content">
            <div class="lighting-settings-item">
              <div class="lighting-settings-item-title">角度</div>
              <div class="item__content angle">
                <div class="angle-outer">
                  <div class="angle-sphere" id="angleSphere">
                  </div>
                </div>
                <div id="shaderRound" class="shader-round" style="transform:rotate(0deg); cursor:grab;"></div>
              </div>
            </div>
            <div class="lighting-settings-item">
              <div class="lighting-settings-item-title">射灯强度</div>
              <div class="slider-container">
                <input type="range" id="lightSlider" min="0" max="20" step="1" value="2" />
                <input type="number" id="lightNumber" min="0" max="20" step="1" value="2" />
              </div>
            </div>
            <div class="lighting-settings-item">
              <div class="lighting-settings-item-title">平面光强度</div>
              <div class="slider-container">
                <input type="range" id="ambientSlider" min="0" max="20" step="1" value="0" />
                <input type="number" id="ambientNumber" min="0" max="20" step="1" value="0" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部面板 -->
    <div id="bottomPanel" class="bottom-panel">
      <div class="flex gap-2">
        <div id="textureBar" class="texture-bar">
          <div class="texture-icon-container is-active" data-texture="贴图" data-tooltip="贴图">
            <img class="texture-icon" src="assets/icons/贴图.svg" alt="贴图" />
          </div>
          <div class="texture-icon-container" data-texture="白膜" data-tooltip="白膜">
            <img class="texture-icon" src="assets/icons/白模.svg" alt="白膜" />
          </div>
          <div class="texture-icon-container" data-texture="法线" data-tooltip="法线">
            <img class="texture-icon" src="assets/icons/法线.svg" alt="法线" />
          </div>
          <div class="texture-icon-container" data-texture="反照" data-tooltip="反射">
            <img class="texture-icon" src="assets/icons/反照.svg" alt="反照" />
          </div>
        </div>
        <div class="upload-wrapper" style="cursor: pointer !important;">
          <input type="file" id="fileInput" accept=".glb" />
          <div class="upload-button" id="uploadBtn">
            <span id="uploadLabel">上传</span>
          </div>
        </div>
        <div class="upload-wrapper">
          <div class="upload-button" id="screenshotBtn">
            <span>截图</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>

</html>
